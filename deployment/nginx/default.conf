# =====================================================
# ServaCode — Nginx reverse proxy
# Routes:
#   servacode.com / www.servacode.com  => public_site (3000)
#   admin.servacode.com                => admin_panel (3001)
#   api.servacode.com                  => backend     (8000)
# =====================================================

upstream backend_upstream {
    server backend:8000;
}

upstream public_site_upstream {
    server public_site:3000;
}

upstream admin_panel_upstream {
    server admin_panel:3001;
}

# ---- HTTP: Let's Encrypt challenge + redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name servacode.com www.servacode.com admin.servacode.com api.servacode.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: API ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.servacode.com;

    ssl_certificate     /etc/letsencrypt/live/servacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/servacode.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location /uploads/ {
        alias /var/www/uploads/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ---- HTTPS: Admin panel ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.servacode.com;

    ssl_certificate     /etc/letsencrypt/live/servacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/servacode.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://admin_panel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ---- HTTPS: Public site ----
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name servacode.com www.servacode.com;

    ssl_certificate     /etc/letsencrypt/live/servacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/servacode.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://public_site_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
