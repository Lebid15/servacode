# =====================================================
# ServaCode — Nginx BOOTSTRAP config (HTTP-only)
# Used during first deployment, before Let's Encrypt SSL is issued.
# After SSL is issued, restore the full default.conf via:
#   git checkout deployment/nginx/default.conf
#   docker compose restart nginx
# =====================================================

upstream backend_upstream {
    server backend:8000;
}

upstream public_site_upstream {
    server public_site:3000;
}

upstream admin_panel_upstream {
    server admin_panel:3001;
}

# API
server {
    listen 80;
    listen [::]:80;
    server_name api.servacode.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 20m;

    location /uploads/ {
        alias /var/www/uploads/;
        autoindex off;
    }

    location /static/ {
        alias /var/www/static/;
    }

    location / {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin
server {
    listen 80;
    listen [::]:80;
    server_name admin.servacode.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://admin_panel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Public (default)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name servacode.com www.servacode.com _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://public_site_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
