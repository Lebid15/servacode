name: Quality Checks

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend compile
        run: python -m compileall config platform_api scripts tests

      - name: Backend tests
        run: pytest

  public_site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public_site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install public site dependencies
        run: npm ci

      - name: Public site type check
        run: npm run type-check

      - name: Public site lint
        run: npm run lint

  admin_panel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_panel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1

      - name: Install admin panel dependencies
        run: pnpm install --frozen-lockfile

      - name: Admin panel type check
        run: pnpm run type-check

      - name: Admin panel lint
        run: pnpm run lint
